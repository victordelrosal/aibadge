name = "aibadge-report-mailer"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
FROM_EMAIL = "AI Badge <victor@fiveinnolabs.com>"
SITE_URL = "https://aibadge.fiveinnolabs.com"
# Public Firebase project id (not a secret). Used to validate the aud/iss
# claims of Firebase ID tokens during keyless JWKS signature verification.
FIREBASE_PROJECT_ID = "ai-badge-2026"

[[kv_namespaces]]
binding = "SLOTS"
id = "e11a3cbfa9df4a52b4b41091db6e4250"

[triggers]
crons = ["0 * * * *"]
